<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchDraw Pro | نظام القياس الذكي</title>
    <style>
        :root { --primary: #007acc; --bg: #121212; --panel: #252526; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #e1e1e1; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { background: var(--panel); padding: 12px; display: flex; gap: 10px; border-bottom: 2px solid #333; justify-content: center; z-index: 10; flex-wrap: wrap; }
        .workspace { flex: 1; position: relative; background: #000; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        .btn { background: #333; color: white; border: 1px solid #444; padding: 10px 16px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.2s; user-select: none; }
        .btn:hover { background: #444; border-color: var(--primary); }
        .btn.active { background: var(--primary); border-color: #fff; }
        .info-bar { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-size: 12px; pointer-events: none; }
        #start-message {
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.8);color:#fff;padding:16px 32px;
            border-radius:10px;font-size:1.5em;z-index:20;text-align:center;
        }
    </style>
</head>
<body>
    <div class="toolbar" id="toolbar">
        <button class="btn active" data-tool="wall">🧱 جدار</button>
        <button class="btn" data-tool="door">🚪 باب</button>
        <button class="btn" data-tool="rect">🟦 غرفة</button>
        <button class="btn" id="clearBtn" style="background:#c0392b">🗑️ مسح</button>
    </div>
    <div class="workspace">
        <canvas id="mainCanvas"></canvas>
        <div id="start-message">
            ابدأ بالرسم
        </div>
        <div class="info-bar">المقياس: كل مربع = 1 متر</div>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const toolbar = document.getElementById('toolbar');
            let elements = [];
            try { elements = JSON.parse(localStorage.getItem('archData')) || []; } catch (e) { elements = []; }
            let tool = 'wall';
            let isDrawing = false;
            let startP = null;
            const gridSize = 25; // كل 25 بكسل = 1 متر

            // إخفاء رسالة البداية إذا كان هناك رسم سابق
            window.addEventListener('DOMContentLoaded', function() {
                if (elements.length > 0) {
                    const msg = document.getElementById('start-message');
                    if (msg) msg.style.display = 'none';
                }
            });

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight - toolbar.offsetHeight;
                draw();
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: Math.round((clientX - rect.left) / gridSize) * gridSize,
                    y: Math.round((clientY - rect.top) / gridSize) * gridSize
                };
            }

            // دالة حساب المسافة بالمتر
            function getLength(x1, y1, x2, y2) {
                let pxDist = Math.hypot(x2 - x1, y2 - y1);
                return (pxDist / gridSize).toFixed(2); // تقريب لرقمين عشريين
            }

            function renderElement(el) {
                ctx.save();
                ctx.lineWidth = 4;
                ctx.strokeStyle = el.type === 'wall' ? 'cyan' : 'white';
                ctx.fillStyle = "yellow"; // لون نص القياس
                ctx.font = "14px Arial";
                
                ctx.beginPath();
                if (el.type === 'door') {
                    const radius = Math.hypot(el.x2 - el.x1, el.y2 - el.y1);
                    ctx.arc(el.x1, el.y1, radius, 0, -Math.PI / 2, true);
                } else if (el.type === 'rect') {
                    ctx.strokeRect(el.x1, el.y1, el.x2 - el.x1, el.y2 - el.y1);
                } else {
                    ctx.moveTo(el.x1, el.y1);
                    ctx.lineTo(el.x2, el.y2);
                }
                ctx.stroke();

                // إضافة كتابة القياس فوق العنصر
                if (el.type !== 'door') {
                    let midX = (el.x1 + el.x2) / 2;
                    let midY = (el.y1 + el.y2) / 2;
                    let dist = getLength(el.x1, el.y1, el.x2, el.y2);
                    ctx.fillText(dist + " م", midX + 5, midY - 5);
                }
                ctx.restore();
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                ctx.strokeStyle = "#1a1a1a";
                for(let i = 0; i < canvas.width; i += gridSize) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                }
                for(let j = 0; j < canvas.height; j += gridSize) {
                    ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
                }
                ctx.restore();
                elements.forEach(renderElement);
            }

            canvas.addEventListener('mousedown', (e) => { isDrawing = true; startP = getPos(e); });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const currentP = getPos(e);
                draw();
                ctx.save();
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                ctx.beginPath();
                ctx.moveTo(startP.x, startP.y);
                ctx.lineTo(currentP.x, currentP.y);
                ctx.stroke();
                // عرض القياس الحي أثناء السحب
                ctx.fillStyle = "white";
                ctx.fillText(getLength(startP.x, startP.y, currentP.x, currentP.y) + " م", currentP.x + 10, currentP.y - 10);
                ctx.restore();
            });

            canvas.addEventListener('mouseup', (e) => {
                if (!isDrawing) return;
                isDrawing = false;
                const endP = getPos(e);
                if (Math.hypot(endP.x - startP.x, endP.y - startP.y) > 5) {
                    elements.push({ type: tool, x1: startP.x, y1: startP.y, x2: endP.x, y2: endP.y });
                    localStorage.setItem('archData', JSON.stringify(elements));
                    // إخفاء رسالة البداية
                    const msg = document.getElementById('start-message');
                    if (msg) msg.style.display = 'none';
                }
                draw();
            });

            // دعم اللمس
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; startP = getPos(e); });
            canvas.addEventListener('touchmove', (e) => {
                if (!isDrawing) return; e.preventDefault();
                const currentP = getPos(e);
                draw();
                ctx.save(); ctx.setLineDash([5, 5]); ctx.strokeStyle = "white";
                ctx.beginPath(); ctx.moveTo(startP.x, startP.y); ctx.lineTo(currentP.x, currentP.y); ctx.stroke();
                ctx.fillText(getLength(startP.x, startP.y, currentP.x, currentP.y) + " م", currentP.x + 10, currentP.y - 10);
                ctx.restore();
            });
            canvas.addEventListener('touchend', (e) => {
                isDrawing = false; draw();
                // إخفاء رسالة البداية
                const msg = document.getElementById('start-message');
                if (msg) msg.style.display = 'none';
            });

            document.querySelectorAll('.btn[data-tool]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    tool = btn.dataset.tool;
                });
            });

            document.getElementById('clearBtn').addEventListener('click', () => {
                if (confirm("مسح المخطط؟")) { elements = []; localStorage.removeItem('archData'); draw();
                    // عند المسح، تظهر رسالة "ابدأ بالرسم" مرة أخرى
                    const msg = document.getElementById('start-message');
                    if (msg) msg.style.display = '';
                }
            });

            window.addEventListener('resize', resize);
            resize();
        })();
    </script>
</body>
</html>
