<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArchDraw Pro | Sketcha Edition</title>
    <style>
        :root { --primary: #007acc; --bg: #000; --panel: #1e1e1e; --text: #e1e1e1; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; height: 100vh; }
        
        /* القائمة الجانبية المحسنة */
        .sidebar {
            width: 260px;
            background: #1e1e1e;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-left: 1px solid #333;
            z-index: 100;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .sidebar h2 { color: var(--primary); margin: 0; font-size: 1.8rem; }
        .sidebar p { color: #888; margin: 0; font-size: 0.9rem; }
        .new-project {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .new-project:hover { background: #005f9e; }
        .projects-list h3 { font-size: 0.9rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .projects-list ul { list-style: none; padding: 0; }
        .projects-list li {
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: 0.2s;
        }
        .projects-list li:hover { background: #333; }
        .projects-list li.active {
            background: #333;
            border-right: 3px solid var(--primary);
        }

        /* منطقة العمل */
        .workspace {
            flex: 1;
            position: relative;
            background: #0a0a0a;
            cursor: crosshair;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* الأزرار العائمة (بجانب القائمة الجانبية) */
        .tools-float {
            position: absolute;
            bottom: 30px;
            left: 280px; /* بجانب القائمة الجانبية */
            display: flex;
            flex-direction: row;
            gap: 12px;
            background: rgba(30,30,30,0.9);
            padding: 12px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }
        .btn-tool {
            background: #333;
            color: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 28px;
            transition: all 0.2s;
        }
        .btn-tool:hover { background: #444; transform: scale(1.05); }
        .btn-tool.active {
            background: var(--primary);
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--primary);
        }

        /* رسالة البداية */
        #start-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 25px 50px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            text-align: center;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 0 30px rgba(0,122,204,0.3);
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>
<body>
    <!-- القائمة الجانبية -->
    <div class="sidebar">
        <h2>ArchDraw Pro</h2>
        <p>نظام القياس الذكي</p>
        <button class="new-project" id="newProjectBtn">+ مشروع جديد</button>
        <div class="projects-list">
            <h3>مشاريعي</h3>
            <ul id="projectsList">
                <li class="active" data-project="default">مشروع تجريبي</li>
                <li data-project="empty">خريبات</li>
            </ul>
        </div>
    </div>

    <!-- منطقة الرسم -->
    <div class="workspace">
        <div class="tools-float">
            <button class="btn-tool active" data-tool="wall">🧱</button>
            <button class="btn-tool" data-tool="door">🚪</button>
            <button class="btn-tool" data-tool="rect">🟦</button>
            <button class="btn-tool" id="clearBtn" style="background:#c0392b">🗑️</button>
        </div>
        <canvas id="c"></canvas>
        <div id="start-message">ابدأ بالرسم الآن ✏️</div>
    </div>

    <script>
        (function() {
            // ========== الإعدادات الأساسية ==========
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            const gridSize = 25; // كل مربع = 1 متر
            let elements = [];
            let tool = 'wall';
            let isDrawing = false;
            let startP = null;

            // تحميل العناصر المحفوظة
            try {
                const saved = localStorage.getItem('archDrawElements');
                if (saved) elements = JSON.parse(saved);
            } catch(e) { console.warn('فشل تحميل البيانات'); }

            // ========== دوال الرسم ==========
            function resize() {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                draw();
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const p = e.touches ? e.touches[0] : e;
                return {
                    x: Math.round((p.clientX - rect.left) / gridSize) * gridSize,
                    y: Math.round((p.clientY - rect.top) / gridSize) * gridSize
                };
            }

            function getLength(x1, y1, x2, y2) {
                return (Math.hypot(x2 - x1, y2 - y1) / gridSize).toFixed(2);
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // رسم الشبكة (رمادية فاتحة)
                ctx.save();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                for(let i = 0; i < canvas.width; i += gridSize) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                }
                for(let j = 0; j < canvas.height; j += gridSize) {
                    ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
                }
                ctx.restore();

                // رسم العناصر
                elements.forEach(el => {
                    ctx.save();
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = el.t === 'wall' ? '#00ffff' : '#ffffff';
                    
                    ctx.beginPath();
                    if (el.t === 'door') {
                        const radius = Math.hypot(el.x2 - el.x1, el.y2 - el.y1);
                        ctx.arc(el.x1, el.y1, radius, 0, -Math.PI/2, true);
                    } else if (el.t === 'rect') {
                        ctx.strokeRect(el.x1, el.y1, el.x2 - el.x1, el.y2 - el.y1);
                    } else {
                        ctx.moveTo(el.x1, el.y1);
                        ctx.lineTo(el.x2, el.y2);
                    }
                    ctx.stroke();

                    // عرض القياس مع خلفية شفافة (للباب نرسم خطاً فقط)
                    if (el.t !== 'door') {
                        const midX = (el.x1 + el.x2) / 2;
                        const midY = (el.y1 + el.y2) / 2;
                        const dist = getLength(el.x1, el.y1, el.x2, el.y2);
                        
                        ctx.fillStyle = 'rgba(0,0,0,0.7)';
                        ctx.fillRect(midX - 25, midY - 15, 50, 20);
                        ctx.fillStyle = 'yellow';
                        ctx.font = 'bold 12px Arial';
                        ctx.fillText(dist + 'm', midX - 18, midY - 2);
                    }
                    ctx.restore();
                });
            }

            // ========== أحداث الرسم ==========
            const start = (e) => {
                e.preventDefault?.();
                isDrawing = true;
                startP = getPos(e);
                document.getElementById('start-message').style.display = 'none';
            };

            const move = (e) => {
                if (!isDrawing) return;
                e.preventDefault?.();
                const curr = getPos(e);
                draw(); // إعادة رسم كل شيء
                
                // رسم مؤقت (خط متقطع)
                ctx.save();
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = '#aaa';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(startP.x, startP.y);
                ctx.lineTo(curr.x, curr.y);
                ctx.stroke();
                
                // عرض القياس أثناء السحب
                const dist = getLength(startP.x, startP.y, curr.x, curr.y);
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(curr.x + 10, curr.y - 25, 50, 20);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px Arial';
                ctx.fillText(dist + 'm', curr.x + 15, curr.y - 10);
                ctx.restore();
            };

            const end = (e) => {
                if (!isDrawing) return;
                e.preventDefault?.();
                isDrawing = false;
                const endP = getPos(e);
                
                if (Math.hypot(endP.x - startP.x, endP.y - startP.y) > 5) {
                    elements.push({
                        t: tool,
                        x1: startP.x,
                        y1: startP.y,
                        x2: endP.x,
                        y2: endP.y
                    });
                    // حفظ في localStorage
                    localStorage.setItem('archDrawElements', JSON.stringify(elements));
                }
                draw();
            };

            // ========== أحداث الأزرار ==========
            document.querySelectorAll('.btn-tool[data-tool]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    tool = btn.dataset.tool;
                });
            });

            document.getElementById('clearBtn').addEventListener('click', () => {
                if (confirm('مسح المخطط بالكامل؟')) {
                    elements = [];
                    localStorage.removeItem('archDrawElements');
                    draw();
                    document.getElementById('start-message').style.display = 'block';
                }
            });

            // مشروع جديد (مسح وبدء من جديد)
            document.getElementById('newProjectBtn').addEventListener('click', () => {
                if (confirm('بدء مشروع جديد؟ سيتم مسح المخطط الحالي.')) {
                    elements = [];
                    localStorage.removeItem('archDrawElements');
                    draw();
                    document.getElementById('start-message').style.display = 'block';
                }
            });

            // التبديل بين المشاريع (مثال بسيط)
            document.querySelectorAll('#projectsList li').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('#projectsList li').forEach(li => li.classList.remove('active'));
                    this.classList.add('active');
                    
                    // هنا يمكن تحميل مشروع مختلف من localStorage حسب البيانات
                    // حالياً ننبه أن هذه ميزة قادمة
                    alert('سيتم تحميل المشروع المحدد قريباً في النسخة القادمة');
                });
            });

            // ========== ربط الأحداث مع دعم اللمس ==========
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            
            canvas.addEventListener('touchstart', start, { passive: false });
            canvas.addEventListener('touchmove', move, { passive: false });
            window.addEventListener('touchend', end);

            // ========== بدء التطبيق ==========
            window.addEventListener('resize', resize);
            resize();

            // إخفاء رسالة البداية إذا كان هناك عناصر
            if (elements.length > 0) {
                document.getElementById('start-message').style.display = 'none';
            }
        })();
    </script>
</body>
</html>
